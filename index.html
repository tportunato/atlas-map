<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — Global Macro Intelligence Map</title>
  <meta name="description" content="Interactive global financial intelligence map — macro indicators and capital flows across countries. Built by Tomaso Portunato.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: 'DM Sans', sans-serif;
      background: #F7F5F1;
      color: #0F2744;
      min-height: 100vh;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
    @keyframes dp { 0%,100%{opacity:.2} 50%{opacity:1} }
    @keyframes flowdot { to { stroke-dashoffset: -20; } }

    /* Custom range slider */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #D0CCC4;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #C8692A;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
    }
    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #C8692A;
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
    }

    /* Layout */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Disclaimer */
    #disc {
      background: #FBF0E9;
      border-bottom: 1px solid #E8E5DE;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #7A3A12;
    }
    #disc button {
      background: none; border: none; cursor: pointer;
      color: #7A3A12; font-size: 16px; line-height: 1; margin-left: 10px;
    }

    /* Nav */
    nav {
      background: #0F2744;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .nav-logo { height: 32px; width: auto; object-fit: contain; }
    .nav-brand { display: flex; align-items: center; gap: 6px; }
    .nav-title { color: #fff; font-weight: 600; font-size: 15px; }
    .nav-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #C8692A; display: inline-block;
      animation: blink 1.8s ease-in-out infinite;
    }
    .nav-center { color: rgba(255,255,255,.65); font-size: 12px; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    #ldmsg { color: rgba(255,255,255,.45); font-size: 10px; }
    .nav-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      border-radius: 0;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.2); }

    /* Indicator bar */
    #ind-bar {
      background: #ECEAE4;
      border-bottom: 2px solid #C8C4BC;
      padding: 9px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .bar-label {
      font-size: 10px; color: #444; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      min-width: 64px;
    }

    /* Buttons */
    .ind-btn, .layer-btn {
      border-radius: 0;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.12s;
    }
    .ind-btn {
      border: 2px solid #0F2744;
      background: #fff;
      color: #0F2744;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
    }
    .ind-btn.on {
      background: #C8692A;
      border-color: #C8692A;
      color: #fff;
      font-weight: 600;
    }
    .layer-btn {
      border: 1.5px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.75);
      padding: 7px 8px;
      font-size: 11px;
      font-weight: 500;
      width: 100%;
      text-align: center;
    }
    .layer-btn.on {
      background: #C8692A;
      border-color: #C8692A;
      color: #fff;
      font-weight: 600;
    }
    .layer-btn:hover:not(.on) { background: rgba(255,255,255,.16); }

    /* Map area */
    #map-area {
      display: flex;
      flex: 1;
      position: relative;
    }

    /* Layer sidebar */
    #layer-sidebar {
      background: #1A3354;
      display: flex;
      flex-direction: column;
      padding: 14px 8px;
      gap: 7px;
      width: 112px;
      flex-shrink: 0;
      border-right: 2px solid #0F2744;
      align-items: stretch;
    }
    .sidebar-label {
      font-size: 9px; color: rgba(255,255,255,.45);
      font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; text-align: center;
      margin-bottom: 3px;
    }
    #leg {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.15);
    }
    #leglbl {
      font-size: 8px; color: rgba(255,255,255,.5);
      font-weight: 700; letter-spacing: .05em;
      text-transform: uppercase; text-align: center;
      margin-bottom: 5px;
    }
    #lcanv { display: block; margin: 0 auto 4px; border-radius: 2px; }
    .leg-mm {
      display: flex; justify-content: space-between;
      font-size: 8px; color: rgba(255,255,255,.45);
    }
    .leg-unit { text-align: center; font-size: 8px; color: rgba(255,255,255,.35); margin-top: 2px; }

    /* Map */
    #map-wrap {
      flex: 1;
      background: #E0DDD5;
      position: relative;
      overflow: hidden;
    }
    #msvg { width: 100%; display: block; }

    /* Country panel */
    #panel {
      display: none;
      position: absolute;
      top: 0; right: 0;
      width: 300px;
      height: 100%;
      background: #fff;
      border-left: 1px solid #E8E5DE;
      z-index: 20;
      flex-direction: column;
      overflow-y: auto;
    }
    #panel.open { display: flex; }
    .panel-head {
      background: #0F2744;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 1;
      flex-shrink: 0;
    }
    #pname { color: #fff; font-weight: 500; font-size: 14px; }
    .panel-close {
      background: none; border: none;
      color: rgba(255,255,255,.6);
      font-size: 20px; cursor: pointer; line-height: 1;
    }
    .panel-body { padding: 14px; }
    .mgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-bottom: 14px;
    }
    .mtile { background: #F7F5F1; padding: 9px 10px; }
    .mtile-label { font-size: 9px; color: #888; margin-bottom: 3px; }
    .mtile-val { font-size: 18px; font-weight: 600; color: #C8692A; }
    .panel-section-title {
      font-size: 11px; font-weight: 600; color: #0F2744; margin-bottom: 7px;
    }
    .panel-divider { border-top: .5px solid #E8E5DE; margin: 12px 0; }
    .ai-text { font-size: 11px; color: #555; line-height: 1.7; margin-bottom: 9px; }
    .tag-data {
      background: #E8EDF3; color: #0F2744;
      font-size: 9px; font-weight: 600;
      padding: 1px 5px; margin-right: 3px;
    }
    .tag-inf {
      background: #FBF0E9; color: #7A3A12;
      font-size: 9px; font-weight: 600;
      padding: 1px 5px; margin-right: 3px;
    }
    .ai-note { font-size: 9px; color: #aaa; margin-top: 10px; }
    .dots { display: flex; gap: 5px; padding: 6px 0; }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #C8692A; display: inline-block;
      animation: dp 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    /* Primary button */
    .btn-primary {
      background: #C8692A; color: #fff;
      border: none; border-radius: 0;
      padding: 8px 16px; font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      width: 100%;
    }
    .btn-primary:hover { background: #A85520; }
    .btn-ghost {
      background: #fff; color: #0F2744;
      border: 2px solid #0F2744; border-radius: 0;
      padding: 5px 12px; font-size: 11px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }

    /* Status */
    #status {
      padding: 7px 20px;
      font-size: 11px; color: #666;
      background: #fff;
      border-top: 1px solid #E8E5DE;
    }

    /* Scrubber */
    #scrubber {
      background: #fff;
      border-top: 1px solid #E8E5DE;
      padding: 12px 20px;
    }
    #yrd {
      text-align: center;
      font-size: 24px; font-weight: 600; color: #0F2744;
      margin-bottom: 10px;
    }
    .scrub-row { display: flex; align-items: center; gap: 10px; }
    .scrub-lbl { font-size: 11px; color: #888; font-weight: 500; min-width: 28px; }
    #play-btn {
      background: #C8692A; color: #fff;
      border: none; border-radius: 0;
      padding: 8px 16px; font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      min-width: 72px; white-space: nowrap;
    }
    #play-btn:hover { background: #A85520; }
  </style>
</head>
<body>
<div id="app">

  <!-- Disclaimer -->
  <div id="disc">
    <span>Portfolio showcase — World Bank data (2010–2023) + synthetic estimates (2024–2026). For demo purposes only.</span>
    <button onclick="this.parentElement.style.display='none'">×</button>
  </div>

  <!-- Nav -->
  <nav>
    <div class="nav-left">
      <img class="nav-logo"
        src="https://res.cloudinary.com/dsgfts9gp/image/upload/Gemini_Generated_Image_uao02uao02uao02u-remove-bg-io_mb5sys.png"
        onerror="this.style.display='none'" alt="">
      <div class="nav-brand">
        <span class="nav-title">Atlas</span>
        <span class="nav-dot"></span>
      </div>
    </div>
    <span class="nav-center" id="nctr">World view</span>
    <div class="nav-right">
      <span id="ldmsg">Loading…</span>
      <button class="nav-btn" onclick="resetAll()">↺ Reset</button>
    </div>
  </nav>

  <!-- Indicator bar -->
  <div id="ind-bar">
    <span class="bar-label">Indicator</span>
    <button class="ind-btn on" id="i-gdp" onclick="setInd('gdp',this)">GDP growth</button>
    <button class="ind-btn" id="i-inf" onclick="setInd('inf',this)">Inflation</button>
    <button class="ind-btn" id="i-fdi" onclick="setInd('fdi',this)">FDI inflows</button>
    <button class="ind-btn" id="i-ca"  onclick="setInd('ca',this)">Curr. account</button>
  </div>

  <!-- Scrubber — above map -->
  <div id="scrubber">
    <div id="yrd">2025</div>
    <div class="scrub-row">
      <button id="play-btn" onclick="togglePlay()">▶ Play</button>
      <span class="scrub-lbl">2010</span>
      <input type="range" id="yslider" min="2010" max="2026" value="2025" step="1" oninput="onYr(+this.value)">
      <span class="scrub-lbl" style="text-align:right">2026</span>
    </div>
  </div>

  <!-- Map area -->
  <div id="map-area">

    <!-- Layer sidebar -->
    <div id="layer-sidebar">
      <div class="sidebar-label">Layers</div>
      <button class="layer-btn on" id="m-c" onclick="toggleMode('c','m-c')">Choropleth</button>
      <button class="layer-btn"    id="m-b" onclick="toggleMode('b','m-b')">Bubbles</button>
      <button class="layer-btn"    id="m-f" onclick="toggleMode('f','m-f')">Flows</button>
      <div id="leg">
        <div id="leglbl"></div>
        <canvas id="lcanv" width="70" height="8"></canvas>
        <div class="leg-mm"><span id="lmin"></span><span id="lmax"></span></div>
        <div class="leg-unit"><span id="lunit"></span></div>
      </div>
    </div>

    <!-- Map -->
    <div id="map-wrap">
      <svg id="msvg" viewBox="0 0 960 460"></svg>
    </div>

    <!-- Country panel -->
    <div id="panel">
      <div class="panel-head">
        <span id="pname"></span>
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
      <div class="panel-body">
        <div class="mgrid" id="mgrid"></div>
        <div class="panel-section-title">
          Trend — <span id="spind"></span> &nbsp;(2010–<span id="spyr">2025</span>)
        </div>
        <svg id="spark" width="100%" height="52" style="overflow:visible;display:block;margin-bottom:14px"></svg>
        <div class="panel-divider"></div>
        <div class="panel-section-title">AI country read</div>
        <div id="aiarea">
          <button class="btn-primary" onclick="genAI()">Generate analysis</button>
        </div>
        <div class="ai-note">World Bank 2010–2023 · Synthetic estimates 2024–2026</div>
      </div>
    </div>

  </div><!-- /map-area -->

  <!-- Status -->
  <div id="status">Loading map data…</div>

</div><!-- /app -->

function seededRand(s) {
  let n = s % 2147483647;

}

  rand(); rand(); rand();

  if (ikey === 'NY.GDP.MKTP.KD.ZG') {
    val = (rand()-.5)*2*gs + gm + (y===2020?-6:0) + (y===2021?3:0);
    if (y >= 2024) val = (rand()-.5)*gs*1.2 + gm*0.9;
  } else if (ikey === 'FP.CPI.TOTL.ZG') {

  }
  SC[ck] = Math.round(val*10)/10;

}

function fbGet(id, ikey, y) {
  const fb = FB[id]; if (!fb) return null;
  const k = Object.keys(IMETA).find(k => IMETA[k].key === ikey);
  const arr = fb[{gdp:'g',inf:'i',fdi:'f',ca:'c'}[k]]; if (!arr) return null;
  const idx = FBY.indexOf(y); return idx >= 0 ? arr[idx] : null;
}
function getV(id, ikey, y) {
  const v = wb[id]?.[ikey]?.[y]; if (v != null) return v;
  const f = fbGet(id, ikey, y); if (f != null) return f;
  return synthData(id, ikey, y);
}

// ── Projection ─────────────────────────────────────────────────────────────
function setupProj() {
  proj = d3.geoNaturalEarth1().scale(153).translate([480, 230]);
  pg = d3.geoPath().projection(proj);
}

// ── Colour helpers ──────────────────────────────────────────────────────────
function hex2rgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lerpC(c1, c2, t) {
  const [r1,g1,b1] = hex2rgb(c1), [r2,g2,b2] = hex2rgb(c2);
  return '#' + [r1+(r2-r1)*t, g1+(g2-g1)*t, b1+(b2-b1)*t].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
function getCol(v) {
  if (v == null || isNaN(v)) return '#D4D0C8';
  if (v >= 0) return lerpC('#EAE6DC', '#0F2744', maxV > 0 ? Math.min(v/maxV, 1) : 0);
  return lerpC('#EAE6DC', '#C8692A', minV < 0 ? Math.min(Math.abs(v)/Math.abs(minV), 1) : 0);
}

function computeRange() {
  const k = IMETA[ind].key; let mn = 0, mx = 0.1;
  features.forEach(f => { const v = getV(f.id, k, yr); mn = Math.min(mn, v); mx = Math.max(mx, v); });
  minV = mn; maxV = mx;
  updateLegend();
}

function updateLegend() {
  const m = IMETA[ind];
  document.getElementById('leglbl').textContent = m.label + (yr >= 2024 ? ' (est.)' : '');
  document.getElementById('lmin').textContent = minV.toFixed(1);
  document.getElementById('lmax').textContent = maxV.toFixed(1);
  document.getElementById('lunit').textContent = m.unit;
  const cv = document.getElementById('lcanv'), ctx = cv.getContext('2d');
  const grd = ctx.createLinearGradient(0, 0, 70, 0);
  if (minV < 0) {
    const mid = Math.max(0, Math.min(1, Math.abs(minV)/(Math.abs(minV)+maxV)));
    grd.addColorStop(0, '#C8692A'); grd.addColorStop(mid, '#EAE6DC'); grd.addColorStop(1, '#0F2744');
  } else {
    grd.addColorStop(0, '#EAE6DC'); grd.addColorStop(1, '#0F2744');
  }
  ctx.clearRect(0, 0, 70, 8); ctx.fillStyle = grd; ctx.fillRect(0, 0, 70, 8);
  document.getElementById('leg').style.display = 'block';
}

function esc(s) { return String(s).replace(/\\/g,'').replace(/'/g,'`').replace(/"/g,'`'); }

// ── Flow lines (geographically spread) ─────────────────────────────────────
function buildFlows() {
  const ck = IMETA.ca.key;
  const surplus = [];
  Object.entries(CTRD).forEach(([id, [lon, lat]]) => {
    const ca = getV(id, ck, yr); if (ca == null) return;
    try {
      const pt = proj([lon, lat]); if (!pt || isNaN(pt[0])) return;
      if (ca > 4) surplus.push({ id, pt, ca, cont: CONTINENT[id] || 'EU' });
    } catch(e) {}
  });
  surplus.sort((a,b) => b.ca - a.ca);

  const lines = []; let fid = 0;
  const allRegions = Object.keys(DEFICIT_TARGETS);
  const sources = surplus.slice(0, 5);

  sources.forEach((s, si) => {
    const regions = allRegions.filter(r => r !== s.cont);
    const picked = [...regions.slice(si % regions.length), ...regions].slice(0, 2);
    picked.forEach(region => {
      const tId = DEFICIT_TARGETS[region][si % DEFICIT_TARGETS[region].length];
      const tCoord = CTRD[tId]; if (!tCoord) return;
      try {
        const tpt = proj(tCoord); if (!tpt || isNaN(tpt[0])) return;
        const [x1,y1] = s.pt, [x2,y2] = tpt;
        const dx = x2-x1, dy = y2-y1, dist = Math.sqrt(dx*dx+dy*dy);
        const cx = (x1+x2)/2 - dy*0.25;
        const cy = (y1+y2)/2 - Math.max(dist*0.28, 40);
        lines.push({ x1,y1,x2,y2,cx,cy, mag:s.ca, fid:fid++ });
      } catch(e) {}
    });
  });
  return lines;
}

// ── Main render ─────────────────────────────────────────────────────────────
function render() {
  if (!pg) return;
  computeRange();
  const k = IMETA[ind].key;
  let h = `<rect width="960" height="460" fill="#E0DDD5"/>`;
  try {
    const gd = pg(d3.geoGraticule()());
    if (gd) h += `<path d="${gd}" fill="none" stroke="#D0CCC4" stroke-width="0.4" opacity="0.5"/>`;
  } catch(e) {}

  // Country paths
  features.forEach(f => {
    try {
      const d = pg(f); if (!d || d.length < 5) return;
      const v = getV(f.id, k, yr);
      const fill = modes.c ? getCol(v) : '#D4D0C8';
      const isSel = selId === f.id;
      const nm = esc(CNAMES[f.id] || ('Country ' + f.id));
      h += `<path d="${d}" fill="${fill}" stroke="${isSel ? '#C8692A' : '#B0ACA4'}" stroke-width="${isSel ? 2 : 0.3}" style="cursor:pointer" onmouseenter="this.style.opacity='.78'" onmouseleave="this.style.opacity='1'" onclick="onCountry('${f.id}','${nm}')"/>`;
    } catch(e) {}
  });

  // Bubbles
  if (modes.b) {
    const fk = IMETA.fdi.key; let mxF = 1;
    Object.keys(CTRD).forEach(id => { const v = getV(id, fk, yr); mxF = Math.max(mxF, Math.abs(v)); });
    Object.entries(CTRD).forEach(([id, [lon, lat]]) => {
      try {
        const fdi = getV(id, fk, yr);
        const pt = proj([lon, lat]); if (!pt || isNaN(pt[0])) return;
        const r = Math.max(3, Math.min(28, Math.abs(fdi)/mxF*28));
        h += `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="${r.toFixed(1)}" fill="${fdi < 0 ? 'rgba(15,39,68,0.5)' : 'rgba(200,105,42,0.5)'}" stroke="rgba(255,255,255,0.5)" stroke-width="0.7" style="cursor:pointer" onclick="onCountry('${id}','${esc(CNAMES[id]||id)}')"/>`;
      } catch(e) {}
    });
  }

  // Flows
  if (modes.f) {
    const lines = buildFlows();
    const mxM = Math.max(...lines.map(l => l.mag), 1);
    lines.forEach(l => {
      const op = (0.45 + l.mag/mxM*0.4).toFixed(2);
      const sw = (1.2 + l.mag/mxM*1.8).toFixed(1);
      const pd = `M${l.x1.toFixed(1)},${l.y1.toFixed(1)} Q${l.cx.toFixed(1)},${l.cy.toFixed(1)} ${l.x2.toFixed(1)},${l.y2.toFixed(1)}`;
      h += `<path id="fl${l.fid}" d="${pd}" fill="none" stroke="#C8692A" stroke-width="${sw}" opacity="${op}" stroke-linecap="round"/>`;
      h += `<circle r="3.5" fill="#C8692A" opacity="${op}"><animateMotion dur="${(2+2*(1-l.mag/mxM)).toFixed(1)}s" repeatCount="indefinite"><mpath href="#fl${l.fid}"/></animateMotion></circle>`;
    });
  }

  document.getElementById('msvg').innerHTML = h;
  const est = yr >= 2024 ? ' (estimated)' : '';
  document.getElementById('status').textContent = `${IMETA[ind].label}${est} · ${yr} · Click any country for details`;
}

function updatePanel() {

  document.getElementById('mgrid').innerHTML = Object.entries(IMETA).map(([k, im]) => {

    return `<div class="mtile"><div class="mtile-label">${im.label} (${im.unit})</div><div class="mtile-val">${v != null ? v.toFixed(1) : '—'}${yr >= 2024 ? '*' : ''}</div></div>`;
  }).join('');
  drawSpark();
}
function drawSpark() {
  const m = IMETA[ind]; const data = [];
  for (let y = 2010; y <= yr; y++) data.push(getV(selId, m.key, y));
  const valid = data.filter(v => v != null);
  const svg = document.getElementById('spark');
  const W = svg.clientWidth || 260, H = 52, pad = 5;
  if (valid.length < 2) { svg.innerHTML = '<text x="0" y="18" font-size="11" fill="#aaa">No data</text>'; return; }
  const mn = Math.min(...valid), mx = Math.max(...valid), rng = mx - mn || 1;
  const split = 2023 - 2010;
  const pts = data.map((v, i) => ({
    x: pad + (i/(data.length-1))*(W-pad*2),
    y: H - pad - ((v-mn)/rng)*(H-pad*2),
    est: i > split
  }));
  const solidPts = pts.filter(p => !p.est);
  const estPts = pts.length > split + 1 ? [pts[Math.min(split, pts.length-1)], ...pts.filter(p => p.est)] : [];
  const sp = solidPts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const ep = estPts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  svg.innerHTML =
    (sp ? `<path d="${sp}" fill="none" stroke="#C8692A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>` : '') +
    (ep ? `<path d="${ep}" fill="none" stroke="#C8692A" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round" opacity="0.6"/>` : '') +
    pts.map((p, i) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i===pts.length-1?3:1.5}" fill="${i===pts.length-1?'#C8692A':'#F7F5F1'}" stroke="#C8692A" stroke-width="1" opacity="${p.est?0.65:1}"/>`).join('');
}

async function genAI() {
  if (!selId) return;
  document.getElementById('aiarea').innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  const data = {};
  Object.values(IMETA).forEach(m => {
    const s = {};
    for (let y = 2010; y <= yr; y++) { const v = getV(selId, m.key, y); if (v != null) s[y] = v; }
    data[m.label] = s;
  });
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: 'You are a macro analyst. Write 2-3 sentences. Tag each with [DATA] or [INFERENCE]. Be specific, cite values.',
        messages: [{ role: 'user', content: `Analyse ${selName} macro position in ${yr}${yr >= 2024 ? ' (estimated data)' : ''}. Data: ${JSON.stringify(data)}` }]
      })
    });
    const j = await res.json();
    const txt = (j.content?.[0]?.text || 'Analysis unavailable.')
      .replace(/\[DATA\]/g, '<span class="tag-data">DATA</span>')
      .replace(/\[INFERENCE\]/g, '<span class="tag-inf">INFERENCE</span>');
    document.getElementById('aiarea').innerHTML = `<div class="ai-text">${txt}</div><button class="btn-ghost" onclick="genAI()">Regenerate</button>`;
  } catch(e) {
    document.getElementById('aiarea').innerHTML = '<div class="ai-text" style="color:#aaa">AI analysis not available.</div>';
  }
}

// ── Controls ────────────────────────────────────────────────────────────────
function setInd(i, el) {
  ind = i;
  document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  if (selId) updatePanel();
  render();
}
function toggleMode(m, btnId) {
  modes[m] = !modes[m];
  document.getElementById(btnId).classList.toggle('on', modes[m]);
  render();
}
function onYr(v) {
  yr = v;
  document.getElementById('yrd').textContent = v;
  document.getElementById('spyr').textContent = v;
  if (selId) updatePanel();
  render();
}
function togglePlay() {
  playing = !playing;
  document.getElementById('play-btn').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) {
    playTmr = setInterval(() => {
      if (yr >= 2026) { playing = false; clearInterval(playTmr); document.getElementById('play-btn').textContent = '▶ Play'; return; }
      yr++; document.getElementById('yslider').value = yr; onYr(yr);
    }, 1200);
  } else {
    clearInterval(playTmr);
  }
}
function resetAll() {
  selId = null; selName = null; playing = false; clearInterval(playTmr);
  document.getElementById('play-btn').textContent = '▶ Play';
  document.getElementById('panel').classList.remove('open');
  document.getElementById('nctr').textContent = 'World view';
  document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('i-gdp').classList.add('on'); ind = 'gdp';
  modes = { c:true, b:false, f:false };
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('m-c').classList.add('on');
  render();
}

// ── Bootstrap ───────────────────────────────────────────────────────────────
function start() {
  setupProj();
  render();
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r => r.json())
    .then(topo => {
      features = topojson.feature(topo, topo.objects.countries).features;
      document.getElementById('ldmsg').textContent = 'Fetching WB…';
      render();
      const keys = Object.values(IMETA).map(m => m.key);
      let done = 0;
      Promise.allSettled(keys.map(async code => {
        try {
          const r = await fetch(`https://api.worldbank.org/v2/country/all/indicator/${code}?date=2010:2023&format=json&per_page=5000`);
          const j = await r.json();
          (j[1] || []).forEach(item => {
            if (!item.value || !item.country?.id) return;
            const num = ISO3N[item.countryiso3code || ''] || item.countryiso3code;
            if (!num) return;
            const y = parseInt(item.date);
            if (!wb[num]) wb[num] = {};
            if (!wb[num][code]) wb[num][code] = {};
            wb[num][code][y] = item.value;
          });
        } catch(e) {}
        done++;
        document.getElementById('ldmsg').textContent = `WB ${Math.round(done/keys.length*100)}%`;
      })).then(() => {
        document.getElementById('ldmsg').textContent = '✓ ' + new Date().toLocaleTimeString();
        render();
      });
    })
    .catch(() => {
      document.getElementById('ldmsg').textContent = 'Synthetic data';
      render();
    });
}

(function wait() {
  if (window.d3 && window.topojson) start();
  else setTimeout(wait, 100);
})();
</script>
